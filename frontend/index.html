<!DOCTYPE html>
<html>
<head>
<title>Web Microservice UTS</title>
<style>
body{
    font-family: Arial;
    background:#4CAF50;
}

.container{
    width:350px;
    margin:80px auto;
    background:white;
    padding:20px;
    border-radius:5px;
    box-shadow:0 0 10px gray;
}

input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="container">
<h3>Form Input User</h3>

<form action="http://192.168.1.6:5000/users" method="post" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Nama" required>
<input type="email" name="email" placeholder="Email" required>
<input type="file" name="photo" required>

<button type="submit">Kirim</button>

</form>

</div>

</body>
</html>
